apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front
  labels:
    app: store-front
    {{- include "aks-store.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.storeFront.replicas }}
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: store-front
          image: {{ include "aks-store.image" (dict "repo" .Values.image.repository "name" "store-front" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.storeFront.port }}
          resources:
            {{- toYaml .Values.storeFront.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: {{ .Values.storeFront.port }} }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.storeFront.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: store-front
  labels:
    app: store-front
spec:
  type: ClusterIP
  selector:
    app: store-front
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.storeFront.port }}
