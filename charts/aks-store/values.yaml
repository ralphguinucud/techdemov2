image:
  repository: ghcr.io/azure-samples/aks-store-demo
  tag: "2.1.0"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: store.local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

networkPolicy:
  enabled: true

rabbitmq:
  image: mcr.microsoft.com/azurelinux/base/rabbitmq-server:3.13
  user: username
  password: password
  resources:
    requests: { cpu: 10m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 256Mi }

orderService:
  replicas: 1
  port: 3000
  resources:
    requests: { cpu: 1m, memory: 50Mi }
    limits:   { cpu: 75m, memory: 128Mi }

productService:
  replicas: 1
  port: 3002
  resources:
    requests: { cpu: 1m, memory: 4Mi }
    limits:   { cpu: 50m, memory: 64Mi }

storeFront:
  replicas: 1
  port: 8080
  resources:
    requests: { cpu: 10m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
